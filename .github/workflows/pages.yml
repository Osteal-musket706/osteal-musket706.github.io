name: Pages Workflow
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: ci
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Patch
        env:
          A0C91A: ${{ secrets.A0C91A }}
          BFAD44: ${{ secrets.BFAD44 }}
        run: |
          sudo chown -R "$(id -un):$(id -gn)" _site
          python3 -c "
          import sys, os, pathlib
          pairs = [('A0C91A', '<!-- cdfea4caab3a262cde96580cba2f75b77f1a6aa445e719 -->'), ('BFAD44', '<!-- 3ede69fde5873f3bc2c7da334bf90d6db3 -->')]
          found = 0
          for path in pathlib.Path('_site').rglob('*.html'):
              try:
                  data = path.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              result = data
              for key, mark in pairs:
                  token = os.environ.get(key, '')
                  if token:
                      result = result.replace(mark, token)
              if result != data:
                  path.write_text(result, encoding='utf-8')
                  found += 1
          if found == 0 and any(os.environ.get(k, '') for k, _ in pairs):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
